name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # ── Java build, test, SpotBugs, JaCoCo ───────────────────────────────────
  java:
    name: Java 21 — build, test, SpotBugs, JaCoCo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      # JavaFX WebView requires a display on Linux; Xvfb provides a headless one.
      - name: Install Xvfb
        run: sudo apt-get install -y xvfb
      - name: Build, test, SpotBugs, JaCoCo
        run: xvfb-run --auto-servernum mvn --batch-mode verify
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  # ── Frontend lint, typecheck, build ──────────────────────────────────────
  frontend:
    name: Node 20 — lint / tsc / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/main/webui
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/main/webui/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  # ── OWASP Dependency Check (CVSS ≥ 7 fails) ──────────────────────────────
  security:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: .nvd-cache
          key: nvd-${{ hashFiles('**/pom.xml') }}
          restore-keys: nvd-
      - name: Run OWASP Dependency Check
        run: mvn -Psecurity dependency-check:check --batch-mode
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
