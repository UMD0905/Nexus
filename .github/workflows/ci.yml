name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # ── Java build & test ──────────────────────────────────────────────────────
  java:
    name: Java 21 — mvn verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # JavaFX WebView requires a display on Linux; Xvfb provides a headless one.
      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Build and test
        run: xvfb-run --auto-servernum mvn --batch-mode verify

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  # ── Frontend lint, typecheck, build ───────────────────────────────────────
  frontend:
    name: Node 20 — lint / tsc / build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/main/webui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/main/webui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
